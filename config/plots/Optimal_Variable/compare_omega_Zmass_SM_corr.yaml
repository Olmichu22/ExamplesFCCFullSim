plots: 
  Omega_GEN_SIGNAL_ALL_SM:
    name: Omega_GEN_SIGNAL
    title: \omega \text{ distribution rho decays at Gen level}
    x: \omega
    y: A.U. 
    # normalize: "max"
    legend: [0.65, 0.62, 0.9, 0.82]
    rebin: 4

  Optimal_var_Muon_SIGNAL_ALL_SM:
    name: GenMuOmegaVar_SIGNAL
    title: x_{\mu} \text{ distribution for muons at Gen level}
    x: \omega
    y: A.U. 
    # normalize: "max"
    legend: [0.65, 0.62, 0.9, 0.82]
    legend_txt_size: 0.03
    rebin: 4
  
  Optimal_var_Electron_SIGNAL_ALL_SM:
    name: GenElOmegaVar_SIGNAL
