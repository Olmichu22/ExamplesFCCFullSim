plots:

  # # si el histo se llama distinto según dataset:
  signal_vs_BG_pol_templates_basecuts:
    rebin: 2
    per_dataset:
      Signal: "RecoMesonEOverBeamE_SIGNAL"
      "Template P1": "RecoMesonEOverBeamE_SIGNAL_P1"
      "Template M1": "RecoMesonEOverBeamE_SIGNAL_M1"
      "Zee BG": "RecoMesonEOverBeamE_BG"
      "Zqq BG": "RecoMesonEOverBeamE_BG"
      "Bhabha BG": "RecoMesonEOverBeamE_BG"
      "Migrations BG": "RecoMesonEOverBeamE_BG"
    title: \text{Signal vs Background }\frac{E_{meson}}{E_{beam}} (\pi \text{ decay})
    x: \frac{E_{meson}}{E_{beam}}
    y: "Events"
    sum_histos:
      "Pseudodata":
        sources:
          - from: "Signal"
            histo: "RecoMesonEOverBeamE_SIGNAL"
          - from: "Migrations BG"
            histo: "RecoMesonEOverBeamE_BG"
            # weight: 1.0  # opcional
          - from: "Bhabha BG"
            histo: "RecoMesonEOverBeamE_BG"
          - from: "Zqq BG"
            histo: "RecoMesonEOverBeamE_BG"
        color: ROOT.kBlack
        color: ROOT.kBlack
        linestyle: 1
        linewidth: 3
        markerstyle: 20
        markersize: 0.8
        draw_with_errors: true
        # markerstyle: 20
        # draw: "HIST P"
        label: \text{Pseudodata, } \pi  \text{ channel}
    show_entries: "absolute" #absolute | percent | both
    ignore_entries_for: ["Template P1", "Template M1", "Pseudodata"]
    extra_legend:
      - 7 fb^{-1}\text{  }\sqrt{s}=91GeV
    legend: [0.25, 0.6, 0.5, 0.85]
