      # "Zee BG": "Omega_BGOther"
      "Zqq BG": "CosTheta_BGOther"
      "Bhabha BG": "CosTheta_BGOther"
      "Migrations BG": "CosTheta_BG"
    title: \text{Signal vs Background} \cos\theta \text{(}\rho \text{ decay)} 
    x: \cos\theta
    y: "Events"
    sum_histos:
      "Pseudodata":
        sources:
          - from: "Signal"
            histo: "CosTheta_SIGNAL"
          - from: "Migrations BG"
            histo: "CosTheta_BG"
            # weight: 1.0  # opcional
          - from: "Bhabha BG"
            histo: "CosTheta_BGOther"
          - from: "Zqq BG"
            histo: "CosTheta_BGOther"
        color: ROOT.kBlack
        linestyle: 1
        linewidth: 3
        # markerstyle: 20
        # draw: "HIST P"
        label: \text{Pseudodata, } \rho  \text{  }2\gamma\text{ channel}
    show_entries: "absolute" #absolute | percent | both
    ignore_entries_for: ["Template P1", "Template M1"]
    legend: [0.65, 0.6, 0.9, 0.9]
    legend_txt_size: 0.02
    extra_legend:
      - 7 fb^{-1}\text{  }\sqrt{s}=91GeV
  
