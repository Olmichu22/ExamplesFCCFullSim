plots:

  # # si el histo se llama distinto según dataset:
  signal_vs_BG_pol_templates_basecuts:
    rebin: 4
    per_dataset:
      Signal: "Omega_SIGNAL"
      "Template P1": "Omega_SIGNAL_P1"
      "Template M1": "Omega_SIGNAL_M1"
      # "Zee BG": "Omega_BGOther"
      "Bhabha BG": "Omega_BGOther"
      "Zqq BG": "Omega_BGOther"
      "Migrations BG": "Omega_BG"
    title: \text{Signal vs Background Omega (}\rho \text{ decay)}
    x: \omega
    y: "Events"
    sum_histos:
      "Pseudodata channel":
        sources:
          - from: "Signal"
            histo: "Omega_SIGNAL"
          - from: "Migrations BG"
            histo: "Omega_BG"
            # weight: 1.0  # opcional
          - from: "Bhabha BG"
            histo: "Omega_BGOther"
          - from: "Zqq BG"
            histo: "Omega_BGOther"
        color: ROOT.kBlack
        linestyle: 1
        linewidth: 3
        # markerstyle: 20
        # draw: "HIST PL"
        markerstyle: 20
        markersize: 0.8
        draw_with_errors: true

        label: \text{Pseudodata, } \rho  \text{  }2\gamma\text{ channel}
    show_entries: "absolute" #absolute | percent | both
    ignore_entries_for: ["Template P1", "Template M1", "Pseudodata channel"]
    legend: [0.55, 0.5, 0.9, 0.85]
    legend_txt_size: 0.03
    extra_legend:
      - 7 fb^{-1}\text{  }\sqrt{s}=91GeV


  signal_vs_BG_costheta_templates_basecuts:
    rebin: 2

    per_dataset:
      Signal: "CosTheta_SIGNAL"
      "Template P1": "CosTheta_SIGNAL_P1"
