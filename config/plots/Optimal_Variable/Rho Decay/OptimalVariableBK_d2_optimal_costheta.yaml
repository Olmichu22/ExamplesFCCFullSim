plots:
  signal_vs_BG_pol_templates_optimal:
    rebin: 5
    per_dataset:
      Signal: CosTheta_Tau_SIGNAL
      Template P1: CosTheta_Tau_P1
      Template M1: CosTheta_Tau_M1
      Zqq BG: CosTheta_Tau_BG
      Bhabha BG: CosTheta_Tau_BG
      Migrations BG: CosTheta_Tau_BG
    title: \text{Bins of }\cos\theta_{\tau} \text{ for } \rho \text{ decay}
    x: \cos\theta_{\tau}
    y: Events
    sum_histos:
      Pseudodata:
        sources:
        - from: Signal
          histo: CosTheta_Tau_SIGNAL
        - from: Migrations BG
          histo: CosTheta_Tau_BG
        - from: Bhabha BG
          histo: CosTheta_Tau_BG
        - from: Zqq BG
          histo: CosTheta_Tau_BG
        color: ROOT.kBlack
        linestyle: 1
        linewidth: 3
        markerstyle: 20
        markersize: 0.8
        draw_with_errors: true
        label: \text{Pseudodata, } \rho  \text{  }2\gamma\text{ channel}
    show_entries: absolute
    ignore_entries_for:
    - Template P1
    - Template M1
    - Pseudodata
    legend:
    - 0.4
    - 0.6
    - 0.75
    - 0.9
    legend_txt_size: 0.03
    extra_legend:
    - 7 fb^{-1}\text{  }\sqrt{s}=91GeV