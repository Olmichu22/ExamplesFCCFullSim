      - histoRecoTauP0
      - histoMatchedGenTauVisP0
    labels:
      - Gen Tau Vis P
      - Reco Tau P
      - Matched Gen Tau Vis P
    title: "Histogram of Tau P (Decay 0)"
    x: "P [GeV/c]"
    y: "Events"
    position: [0.35, 0.35, 0.65, 0.54]
    
  PEffi1:
