plot_together:
  Pi0Mass:
    variabs:
      - hRecoConstPi0Mass
      - hRecoConstPi0MassFromPhotonMasstr
      - hRecoConstPi0MassFromPhotonDiststr
    labels:
      - Pi0 Mass (2 photons)
      - Pi0 Mass (3 photons, Mass Strategy)
      - Pi0 Mass (3 photons, Dist Strategy)
    title: "Histogram of Pi0 Mass"
    x: "Pi0 Mass [GeV/c]"
    y: "Events"
    norm: True

  ThreePhotonsPMass:
    variabs:
      - hRecoConstlessPhotonPa1strMass
      - hRecoConstxtraPhotonPrhostrMass
    labels:
      - 3 Photons Mass (Mass Strategy) - a1
      - 3 Photons Mass (Mass Strategy) - rho
    title: "Histogram of 3 Photons cases P (Mass Strategy)"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True
  
  ThreePhotonsPDist:
    variabs:
      - hRecoConstlessPhotonPa1strDist
      - hRecoConstxtraPhotonPrhostrDist
    labels:
      - 3 Photons Mass - a1
      - 3 Photons Mass - rho
    title: "Histogram of 3 Photons cases P (Dist Strategy)"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True

  OnePhotonP:
    variabs:
      - hRecoConstlessPhotonPrho
      - hRecoConstxtraPhotonPi
    labels:
      - 1 Photon P - rho
      - 1 Photon P - pi
    title: "Histogram of 1 Photon P"
    x: "1 Photon P [GeV/c]"
    y: "Events"
    norm: True
  
  ThreePhotonMatch:
    variabs:
      - hRecoThreePhotonMatchOnestrMassP
      - hRecoThreePhotonMatchTwostrMassP
      - hRecoThreePhotonNoMatchstrMassP
    labels:
      - 1 Photon P (Mass Strategy)
      - 2 Photons P (Mass Strategy)
      - No Match P (Mass Strategy)
    title: "Histogram of 3 Photons cases P (Mass Strategy)"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True
  
  ThreePhotonsPMassZoom:
    variabs:
      - hRecoConstlessPhotonPa1strMassZoom
      - hRecoConstxtraPhotonPrhostrMassZoom
    labels:
      - 3 Photons Mass (Mass Strategy) - a1
      - 3 Photons Mass (Mass Strategy) - rho
    title: "Histogram of 3 Photons cases P (Mass Strategy) - Zoom"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True
    position: [0.45, 0.28, 0.75, 0.38]


  OnePhotonPZoom:
    variabs:
      - hRecoConstlessPhotonPrhoZoom
      - hRecoConstxtraPhotonPiZoom
    labels:
      - 1 Photon P - rho
      - 1 Photon P - pi
    title: "Histogram of 1 Photon P - Zoom"
    x: "1 Photon P [GeV/c]"
    y: "Events (normalized)"
    norm: True
    position: [0.7, 0.3, 0.9, 0.5]
  
  RecoTwoPhotonPiRho:
    variabs:
      - hRecoRhoTwoPhotonDecayP
      - hRecoRhoPiDecayP
      - hRecoRhoTwoPhotonDecaySumP
    labels:
      - 2 Photon P
      - Pion P
      - 2 Photon Sum P
    title: "Histogram of Reco Rho Component P"
    x: "Component P [GeV/c]"
    y: "Events"
    norm: True

  GenTwoPhotonPiRho:
    variabs:
      - hGenRhoTwoPhotonDecayP
      - hGenRhoPiDecayP
      - hGenRhoTwoPhotonDecaySumP
    labels:
      - 2 Photon P
      - Pion P
      - 2 Photon Sum P
    title: "Histogram of Gen Rho Component P"
    x: "Component P [GeV/c]"
    y: "Events"
    norm: True
  
  RecoOnePhotonPiRho:
    variabs:
      - hRecoRhoOnePhotonDecayPiP
      - hRecoRhoOnePhotonDecayPhotonP
    labels:
      - Pion P
      - Photon P
    title: "Histogram of Reco Rho Component P (photon loss case)"
    x: "Component P [GeV/c]"
    y: "Events"
    norm: True
  
  GenOnePhotonPiRho:
    variabs:
      - hGenRhoOnePhotonDecayPiP
      - hGenRhoOnePhotonDecayPhotonP
      - hGenRhoOnePhotonDecayPhotonSumP
    labels:
      - Pion P
      - Photons P
      - Photons Sum P
    title: "Histogram of Gen Rho Component P (photon loss case)"
    x: "Component P [GeV/c]"
    y: "Events"
    norm: True
  
  OnePhotonRecognition:
    variabs:
      - hGenRhoOnePhotonDecayPhotonP
      - hGenRhoOnePhotonDecayPhotonSumP
      - hRecoRhoOnePhotonDecayPhotonP
    labels:
      - Gen Photons P
      - Gen Photons Sum P
      - Reco Photon P
    title: "Histogram of Gen and Reco Photons P (photon loss case)"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True
    position: [0.6, 0.3, 0.9, 0.5]


  RecoPResolution:
    variabs:
      - histoTauPRes0
      - histoTauPRes1
      - histoTauPRes2
      - histoTauPRes10
    labels:
      - (\tau \rightarrow \pi\gamma)
      - (\rho \rightarrow \pi \pi ^0\gamma)
      - (a_1 \rightarrow \pi 2\pi ^0\gamma)
      - (a_1 \rightarrow 3\pi \gamma)
    title: "Histogram of Tau P Resolution"
    x: "(P_{Reco}-P_{Gen})/P_{Gen}"
    y: "Events"
    norm: True
  
  RecoMatchedPResolution:
    variabs:
      - histoMatchedTauPRes0
      - histoMatchedTauPRes1
      - histoMatchedTauPRes2
      - histoMatchedTauPRes3
    labels:
      - (\tau \rightarrow \pi\gamma)
      - (\rho \rightarrow \pi \pi ^0\gamma)
      - (a_1 \rightarrow \pi 2\pi ^0\gamma)
      - (a_1 \rightarrow 3\pi \gamma)
    title: "Histogram of Matched Tau P Resolution"
    x: "(P_{Reco}-P_{Gen})/P_{Gen}"
    y: "Events"
    norm: True

  RecoMatchedThetaResolution:
    variabs:
      - histoMatchedTauThetaRes0
      - histoMatchedTauThetaRes1
      - histoMatchedTauThetaRes2
      - histoMatchedTauThetaRes3
    labels:
      - (\tau \rightarrow \pi\gamma)
      - (\rho \rightarrow \pi \pi ^0\gamma)
      - (a_1 \rightarrow \pi 2\pi ^0\gamma)
      - (a_1 \rightarrow 3\pi \gamma)
    title: "Histogram of Matched Tau Theta Resolution"
    x: "(\\theta_{Reco}-\\theta_{Gen})/\\theta_{Gen}" 
    y: "Events"
    norm: True
  
  RecoThetaResolution:
    variabs:
      - histoTauThetaRes0
      - histoTauThetaRes1
      - histoTauThetaRes2
      - histoTauThetaRes10
    labels:
      - (\tau \rightarrow \pi\gamma)
      - (\rho \rightarrow \pi \pi ^0\gamma)
      - (a_1 \rightarrow \pi 2\pi ^0\gamma)
      - (a_1 \rightarrow 3\pi \gamma)
    title: "Histogram of Tau Theta Resolution"
    x: "(\\theta_{Reco}-\\theta_{Gen})/\\theta_{Gen}"
    y: "Events"
    norm: True
  
  EffiTheta:
    variabs:
      - hEffiGenTauTheta0
      - hEffiGenTauTheta1
      - hEffiGenTauTheta2
      - hEffiGenTauTheta10
    labels:
      - (\tau \rightarrow \pi\gamma)
      - (\rho \rightarrow \pi \pi ^0\gamma)
      - (a_1 \rightarrow \pi 2\pi ^0\gamma)
      - (a_1 \rightarrow 3\pi \gamma)
    title: "Efficiency of Tau Theta"
    x: "Theta [rad]"
    y: "Efficiency"
    position: [0.45, 0.2, 0.75, 0.4]

  ThetaEffi0:
    variabs:
      - histoGenTauTheta0
      - histoRecoTauTheta0
      - histoMatchedGenTauTheta0
    labels:
      - Gen Tau Theta
      - Reco Tau Theta
      - Matched Gen Tau Theta
    title: "Histogram of Tau Theta (Decay 0)"
    x: "Theta [rad]"
    y: "Events"
    position: [0.45, 0.3, 0.75, 0.4]

  ThetaEffi01:
    variabs:
      - hEffiGenTauTheta0
      - hEffiGenTauTheta1
    labels:
      - \pi \text{ decay } \theta \text{ efficiency}
      - \rho \text{ decay } \theta \text{ efficiency}
    title: "Efficiency of Tau Theta"
    x: \theta \text{ [rad]}
    y: "Efficiency"
    position: [0.45, 0.3, 0.75, 0.4]


  ThetaEffi1:
    variabs:
      - histoGenTauTheta1
      - histoRecoTauTheta1
      - histoMatchedGenTauTheta1
    labels:
      - \text{Gen Tau }\theta
      - \text{Reco Tau }\theta
      - \text{Matched Gen Tau }\theta
    title: Histogram of Tau Efficency (Decay 1)
    x: \theta \text{ [rad]}
    y: "Events"
    position: [0.45, 0.3, 0.77, 0.4]


  ThetaEffi2:
    variabs:
      - histoGenTauTheta2
      - histoRecoTauTheta2
      - histoMatchedGenTauTheta2
    labels:
      - Gen Tau Theta
      - Reco Tau Theta
      - Matched Gen Tau Theta
    title: "Histogram of Tau Theta (Decay 2)"
    x: "Theta [rad]"
    y: "Events"
    position: [0.45, 0.3, 0.75, 0.4]

  RhoDecayRes:
    variabs:
      - histoTauThetaRes1
      - histoTauPRes1
    labels:
      - \theta \text{ resolution}
      - P resolution
    title: \text{Histogram of }\rho \text{ Decay Resolution}
    x: Resolution
    y: Normalized Events
    norm: true

  ThetaEffi10:
    variabs:
      - histoGenTauTheta10
      - histoRecoTauTheta10
      - histoMatchedGenTauTheta10
    labels:
      - Gen Tau Theta
      - Reco Tau Theta
