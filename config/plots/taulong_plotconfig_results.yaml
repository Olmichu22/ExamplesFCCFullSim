plot_together:
  TauPEfficiency:
    variabs:
      - hEffiGenHadronTauP
      - hEffiGenTauP0
      - hEffiGenTauP1
      - hEffiGenTauP2
      - hEffiGenTauP10
    labels:
      - "Hadronic decays"
      - (\tau \rightarrow \pi)
      - (\rho \rightarrow \pi \pi ^0)
      - (a_1 \rightarrow \pi 2\pi ^0)
      - (a_1 \rightarrow 3\pi)
    title: "Tau P Efficiency"
    x: "P [GeV/c]"
    y: "Efficiency"
    position: [0.7, 0.3, 0.9, 0.5]

  PionMissClassP:
    variabs:
      # - hUnmatchedRecoPionsP
      - h111RecoPionsP
      # - h16RecoPionsP
      - h11RecoPionsP
      - h321RecoPionsP
      - h13RecoPionsP
      - h311RecoPionsP
      - h12RecoPionsP
      - h14RecoPionsP
      # - h221RecoPionsP
      # - h130RecoPionsP
      # - h310RecoPionsP
      # - h223RecoPionsP
      # - h22RecoPionsP
      # - h323RecoPionsP
    labels:
      # - Unmached Pions
      - Pion -> 111
      - Pion -> 11
      - Pion -> 321
      - Pion -> 13
      - Pion -> 311
      - Pion -> 12
      - Pion -> 14
    title: Pion missmatch P Distribution
    x: Pion P [GeV/c]
    y: Events
    logy: True
  PhotonP:
    variabs:
      - histoMatchedGenPhotonP
      - histoGenPhotonP
      - histoRecoPhotonP
    labels:
      - Matched Gen Photon P
      - Gen Photon P
      - Reco Photon P
    title: "Photon P Distribution"
    x: "Photon P [GeV/c]"
    y: "Events"
  PhotonTheta:
    variabs:
      - histoMatchedGenPhotonTheta
      - histoGenPhotonTheta
      - histoRecoPhotonTheta
    labels:
      - Matched Gen Photon Theta
      - Gen Photon Theta
      - Reco Photon Theta
    title: "Photon Theta Distribution"
    x: "Theta [rad]"
    y: "Events"
  PionP:
    variabs:
      - histoMatchedGenPionP
      - histoGenPionP
      - histoRecoPionP
    labels:
      - Matched Gen Pion P
      - Gen Pion P
      - Reco Pion P
    title: "Pion P Distribution"
    x: "Pion P [GeV/c]"
    y: "Events"
  PionTheta:
    variabs:
      - histoMatchedGenPionTheta
      - histoGenPionTheta
      - histoRecoPionTheta
    labels:
      - Matched Gen Pion Theta
      - Gen Pion Theta
      - Reco Pion Theta
    title: "Pion Theta Distribution"
    x: "Theta [rad]"
    y: "Events"
  Pi0Mass:
    variabs:
      - hRecoConstPi0Mass
      - hRecoConstPi0MassFromPhotonMasstr
      - hRecoConstPi0MassFromPhotonDiststr
    labels:
      - Pi0 Mass (2 photons)
      - Pi0 Mass (3 photons, Mass Strategy)
      - Pi0 Mass (3 photons, Dist Strategy)
    title: "Histogram of Pi0 Mass"
    x: "Pi0 Mass [GeV/c]"
    y: "Events"
    norm: True

  ThreePhotonsPMass:
    variabs:
      - hRecoConstlessPhotonPa1strMass
      - hRecoConstxtraPhotonPrhostrMass
    labels:
      - 3 Photons Mass (Mass Strategy) - a1
      - 3 Photons Mass (Mass Strategy) - rho
    title: "Histogram of 3 Photons cases P (Mass Strategy)"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True
  
  ThreePhotonsPDist:
    variabs:
      - hRecoConstlessPhotonPa1strDist
      - hRecoConstxtraPhotonPrhostrDist
    labels:
      - 3 Photons Mass - a1
      - 3 Photons Mass - rho
    title: "Histogram of 3 Photons cases P (Dist Strategy)"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True

  OnePhotonP:
    variabs:
      - hRecoConstlessPhotonPrho
      - hRecoConstxtraPhotonPi
    labels:
      - 1 Photon P - rho
      - 1 Photon P - pi
    title: "Histogram of 1 Photon P"
    x: "1 Photon P [GeV/c]"
    y: "Events"
    norm: True
  
  ThreePhotonMatch:
    variabs:
      - hRecoThreePhotonMatchOnestrMassP
      - hRecoThreePhotonMatchTwostrMassP
      - hRecoThreePhotonNoMatchstrMassP
    labels:
      - 1 Photon P (Mass Strategy)
      - 2 Photons P (Mass Strategy)
      - No Match P (Mass Strategy)
    title: "Histogram of 3 Photons cases P (Mass Strategy)"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True
  
  ThreePhotonsPMassZoom:
    variabs:
      - hRecoConstlessPhotonPa1strMassZoom
      - hRecoConstxtraPhotonPrhostrMassZoom
    labels:
      - 3 Photons Mass (Mass Strategy) - a1
      - 3 Photons Mass (Mass Strategy) - rho
    title: "Histogram of 3 Photons cases P (Mass Strategy) - Zoom"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True
    position: [0.45, 0.28, 0.75, 0.38]


  OnePhotonPZoom:
    variabs:
      - hRecoConstlessPhotonPrhoZoom
      - hRecoConstxtraPhotonPiZoom
    labels:
      - 1 Photon P - rho
      - 1 Photon P - pi
    title: "Histogram of 1 Photon P - Zoom"
    x: "1 Photon P [GeV/c]"
    y: "Events (normalized)"
    norm: True
    position: [0.7, 0.3, 0.9, 0.5]
  
  RecoTwoPhotonPiRho:
    variabs:
      - hRecoRhoTwoPhotonDecayP
      - hRecoRhoPiDecayP
      - hRecoRhoTwoPhotonDecaySumP
    labels:
      - 2 Photon P
      - Pion P
      - 2 Photon Sum P
    title: "Histogram of Reco Rho Component P"
    x: "Component P [GeV/c]"
    y: "Events"
    norm: True

  GenTwoPhotonPiRho:
    variabs:
      - hGenRhoTwoPhotonDecayP
      - hGenRhoPiDecayP
      - hGenRhoTwoPhotonDecaySumP
    labels:
      - 2 Photon P
      - Pion P
      - 2 Photon Sum P
    title: "Histogram of Gen Rho Component P"
    x: "Component P [GeV/c]"
    y: "Events"
    norm: True
  
  RecoOnePhotonPiRho:
    variabs:
      - hRecoRhoOnePhotonDecayPiP
      - hRecoRhoOnePhotonDecayPhotonP
    labels:
      - Pion P
      - Photon P
    title: "Histogram of Reco Rho Component P (photon loss case)"
    x: "Component P [GeV/c]"
    y: "Events"
    norm: True
  
  GenOnePhotonPiRho:
    variabs:
      - hGenRhoOnePhotonDecayPiP
      - hGenRhoOnePhotonDecayPhotonP
      - hGenRhoOnePhotonDecayPhotonSumP
    labels:
      - Pion P
      - Photons P
      - Photons Sum P
    title: "Histogram of Gen Rho Component P (photon loss case)"
    x: "Component P [GeV/c]"
    y: "Events"
    norm: True
  
  OnePhotonRecognition:
    variabs:
      - hGenRhoOnePhotonDecayPhotonP
      - hGenRhoOnePhotonDecayPhotonSumP
      - hRecoRhoOnePhotonDecayPhotonP
    labels:
      - Gen Photons P
      - Gen Photons Sum P
      - Reco Photon P
    title: "Histogram of Gen and Reco Photons P (photon loss case)"
    x: "Photon P [GeV/c]"
    y: "Events"
    norm: True
    position: [0.6, 0.3, 0.9, 0.5]


  RecoPResolution:
    variabs:
      - histoTauPRes0
      - histoTauPRes1
      - histoTauPRes2
      - histoTauPRes10
    labels:
      - (\tau \rightarrow \pi\gamma)
      - (\rho \rightarrow \pi \pi ^0\gamma)
      - (a_1 \rightarrow \pi 2\pi ^0\gamma)
      - (a_1 \rightarrow 3\pi \gamma)
    title: "Histogram of Tau P Resolution"
    x: "(P_{Reco}-P_{Gen})/P_{Gen}"
    y: "Events"
    norm: True
  
  RecoMatchedPResolution:
    variabs:
      - histoMatchedTauPRes0
      - histoMatchedTauPRes1
      - histoMatchedTauPRes2
      - histoMatchedTauPRes3
    labels:
      - (\tau \rightarrow \pi\gamma)
      - (\rho \rightarrow \pi \pi ^0\gamma)
      - (a_1 \rightarrow \pi 2\pi ^0\gamma)
      - (a_1 \rightarrow 3\pi \gamma)
    title: "Histogram of Matched Tau P Resolution"
    x: "(P_{Reco}-P_{Gen})/P_{Gen}"
    y: "Events"
    norm: True

  RecoMatchedThetaResolution:
    variabs:
      - histoMatchedTauThetaRes0
      - histoMatchedTauThetaRes1
      - histoMatchedTauThetaRes2
      - histoMatchedTauThetaRes3
    labels:
      - (\tau \rightarrow \pi\gamma)
      - (\rho \rightarrow \pi \pi ^0\gamma)
      - (a_1 \rightarrow \pi 2\pi ^0\gamma)
      - (a_1 \rightarrow 3\pi \gamma)
    title: "Histogram of Matched Tau Theta Resolution"
    x: "(\\theta_{Reco}-\\theta_{Gen})/\\theta_{Gen}" 
    y: "Events"
    norm: True
  
  RecoThetaResolution:
    variabs:
      - histoTauThetaRes0
      - histoTauThetaRes1
      - histoTauThetaRes2
      - histoTauThetaRes10
    labels:
      - (\tau \rightarrow \pi\gamma)
