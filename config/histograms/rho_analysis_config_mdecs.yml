      x_range: [0, 3]
      y_bins: 100
      y_range: [0, 3]
      categories:
        SIGNAL_SIGNAL: {weights: []}
        ALL_ALL:       {weights: []}

    WeightM1_dec0_vs_dec1:
      type: 2D
      x_bins: 100
      x_range: [0, 2.1]
      y_bins: 100
      y_range: [0, 2.1]
      categories:
        SIGNAL_SIGNAL: {weights: []}
        ALL_ALL:       {weights: []}

    # ZVisMass bins (llenado inline en process_tree_range_mdecs)
    Omega_ZVisMass_Bin1_dec0:
      type: 1D
      bins: 50
      range: [-1, 1]
      categories:
