      categories:
        SIGNAL_SIGNAL: {weights: []}
        ALL_ALL:       {weights: []}

    Omega_ZVisMass_Bin3_dec1:
      type: 1D
      bins: 50
      range: [-1, 1]
      categories:
        SIGNAL_SIGNAL: {weights: []}
        ALL_ALL:       {weights: []}

  # ──────────────────────────────────────────────────────────────────────────
